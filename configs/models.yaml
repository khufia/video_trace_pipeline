agents:
  planner:
    backend: openai
    model: gpt-5.4
    endpoint: default
    temperature: 0.0
    max_tokens: 6000
    prompt_version: planner_v2
  trace_synthesizer:
    backend: openai
    model: gpt-5.4
    endpoint: default
    temperature: 0.0
    max_tokens: 16000
    prompt_version: synthesizer_v2
  trace_auditor:
    backend: openai
    model: gpt-5.4
    endpoint: default
    temperature: 0.0
    max_tokens: 3000
    prompt_version: auditor_v2
  atomicizer:
    backend: openai
    model: gpt-5.4
    endpoint: default
    temperature: 0.0
    max_tokens: 3000
    prompt_version: atomicizer_v1

tools:
  visual_temporal_grounder:
    enabled: true
    description: Production visual temporal grounder using TimeLens-8B.
    model: TencentARC/TimeLens-8B
    prompt_version: tool_v2
    top_k: 8
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.timelens_runner
      backend_name: timelens
      clip_duration_s: 60
      use_embedding_prefilter: true
      prefilter_embedder_model: Qwen/Qwen3-VL-Embedding-8B
      prefilter_top_frames: 16
      prefilter_window_budget: 16
      prefilter_neighbor_radius: 1
      dense_frame_embed_batch: 8
      device_map: null
      attn_implementation: flash_attention_2
      temperature: 0.0
      do_sample: false
  frame_retriever:
    enabled: true
    description: Production frame retriever using a Qwen3 embedder and optional reranker within a bounded clip.
    prompt_version: tool_v2
    model: Qwen/Qwen3-VL-Embedding-8B
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.frame_retriever_runner
      backend_name: qwen_frame_retriever
      reranker_model: Qwen/Qwen3-VL-Reranker-8B
      use_reranker: false
      device_map: null
      candidate_frames: 12
      dense_frame_embed_batch: 8
      attn_implementation: flash_attention_2
      temperature: 0.0
      do_sample: false
  audio_temporal_grounder:
    enabled: true
    description: Production audio temporal grounder using SpotSound.
    model: Loie/SpotSound
    prompt_version: tool_v2
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.spotsound_runner
      backend_name: spotsound
      base_model: nvidia/audio-flamingo-3-hf
      temperature: 0.0
      do_sample: false
  asr:
    enabled: true
    description: WhisperX / Whisper-large-v3 ASR.
    prompt_version: tool_v2
    extra:
      model_name: large-v3
      language: null
  dense_captioner:
    enabled: true
    description: Production dense captioner using TimeChat-Captioner over bounded 30s/60s video clips.
    model: yaolily/TimeChat-Captioner-GRPO-7B
    prompt_version: tool_v2
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.timechat_dense_caption_runner
      backend_name: timechat_captioner
      sample_frames: 10
      fps: 2.0
      max_frames: 160
      max_pixels: 297920
      video_max_pixels: 297920
      use_audio_in_video: true
      attn_implementation: flash_attention_2
      temperature: 0.0
      do_sample: false
  ocr:
    enabled: true
    description: Production OCR using PaddleOCR.
    model: PaddleOCR
    prompt_version: tool_v2
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.paddleocr_runner
      backend_name: paddleocr
      lang: en
      ocr_version: PP-OCRv5
      require_gpu: false
      use_textline_orientation: false
      max_longest_dim: 1600
  spatial_grounder:
    enabled: true
    description: Bounding-box localization inside a retrieved frame using the local Qwen multimodal backend.
    prompt_version: tool_v2
    model: Qwen/Qwen3.5-9B
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.spatial_grounder_runner
      backend_name: qwen35vl_spatial
      attn_implementation: flash_attention_2
      temperature: 0.0
      do_sample: false
  generic_purpose:
    enabled: true
    description: Production generic extractor using Qwen3.5-9B with optional evidence-db context.
    model: Qwen/Qwen3.5-9B
    prompt_version: tool_v2
    extra:
      command:
        - python3
        - -m
        - video_trace_pipeline.tool_wrappers.qwen35vl_runner
      backend_name: qwen35vl
      attn_implementation: flash_attention_2
      temperature: 0.0
      do_sample: false
