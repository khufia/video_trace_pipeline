workspace_root: /fs/nexus-scratch/gnanesh/cot/video_trace_pipeline/workspace
cache_root: /fs/nexus-scratch/gnanesh/cot/video_trace_pipeline/workspace/cache
hf_cache: /fs/nexus-scratch/gnanesh/.cache/huggingface
ffmpeg_bin: /fs/nexus-scratch/gnanesh/ffmpeg-7.0.2-amd64-static/ffmpeg

datasets:
  videomathqa:
    root: /fs/nexus-scratch/gnanesh/cot/VideoMathQA
    annotations: /fs/nexus-scratch/gnanesh/cot/VideoMathQA/annotations.json
    videos_subdir: videos
  omnivideobench:
    root: /fs/nexus-scratch/gnanesh/cot/OmniVideoBench
    annotations: /fs/nexus-scratch/gnanesh/cot/OmniVideoBench/data.jsonl
    videos_subdir: videos

agent_endpoints:
  default:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

gpu_assignments:
  visual_temporal_grounder: cuda:0
  dense_captioner: cuda:1
  frame_retriever: cuda:2
  asr: cuda:2
  ocr: cuda:2
  audio_temporal_grounder: cuda:2
  spatial_grounder: cuda:3
  generic_purpose: cuda:3
  verifier: cuda:3

env_overrides:
  HF_HOME: /fs/nexus-scratch/gnanesh/.cache/huggingface
  HUGGINGFACE_HUB_CACHE: /fs/nexus-scratch/gnanesh/.cache/huggingface/hub
  TOKENIZERS_PARALLELISM: "false"
